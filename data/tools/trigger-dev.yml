scale_ceiling: "Free tier is small ($5 credit). Pro gives $50 usage credit and higher concurrency."
graduation_to: "Self-hosted Trigger.dev (open source) or BullMQ + Redis"

cost_at_scale:
  100_users: "$0"
  1000_users: "$0"
  10000_users: "$0-50"
  100000_users: "$50-200"

gotchas:
  - "Free tier is just $5/mo credit. Can burn through quickly with active products."
  - "Pricing is usage-based (compute seconds + invocation fees), not a simple bucket."
  - "Open source so you can self-host to avoid per-run costs."
  - "Newer project, smaller community than Inngest."

