name: "Trigger.dev"
url: "https://trigger.dev"
category: "background-jobs"
description: "Open source background jobs for Next.js and Node.js. Long-running tasks, cron, and workflows."

free_tier: "$5 monthly usage credit, 20 concurrent runs"
solo_price: "$10/mo (Hobby, $10 credit) or $50/mo (Pro, $50 credit). Usage-based compute."
