name: "Cursor"
url: "https://cursor.com"
category: "ai-tools"
description: "AI-native code editor built as a VS Code fork. Inline completions, chat, and agentic coding in one IDE."

free_tier: "Limited (Hobby plan with basic features)"
solo_price: "$20/mo (Pro). Also Pro+ at $60/mo (3x usage) and Ultra at $200/mo (20x usage)"
pricing_url: "https://cursor.com/pricing"

scale_ceiling: "Usage limits on Pro. Cursor no longer publishes specific request counts, uses relative multipliers instead."
graduation_to: "Claude Code for deeper agentic work, or API-based coding agents for unlimited usage"

cost_at_scale:
  100_users: "$20/mo (per-developer tool, not per-user)"
  1000_users: "$20/mo"
  10000_users: "$20/mo"
  100000_users: "$20/mo"

gotchas:
  - "Usage limits reset monthly. No rollover, no burst capacity."
  - "Background agent burns through usage quickly. A single complex task can eat dozens of requests."
  - "VS Code fork means some extensions may not work or may lag behind upstream updates."
  - "Teams plan at $40/mo/seat (was Business) adds admin controls."
  - "Per-developer cost, not per-user. Scales with team size, not product usage."

