name: Community Question Monitor

on:
  schedule:
    - cron: "0 9 * * 3" # Every Wednesday at 9am UTC
  workflow_dispatch: # Manual trigger

jobs:
  scan-community:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Scan community forums
        id: scan
        run: node scripts/check-community.js

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/community-digest.md 2>/dev/null; then
            echo "No digest changes to commit."
          else
            git add data/community-digest.md
            git commit -m "chore: update community question digest [automated]"
            git push
          fi

      - name: Notify via issue comment (if significant)
        if: steps.scan.outputs.found_posts == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const count = '${{ steps.scan.outputs.post_count }}';

            // Only create a discussion/notification if there are 5+ relevant posts
            if (parseInt(count) >= 5) {
              const today = new Date().toISOString().split('T')[0];
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Community] ${count} relevant posts found (week of ${today})`,
                labels: ['community'],
                body: `The community monitor found **${count} relevant posts** this week across Reddit.\n\nCheck the digest at \`data/community-digest.md\` for the full list with links.\n\nThese are engagement opportunities -- places where solo-stack can help people who are asking the exact questions we answer.\n\n*This issue was created automatically by the community monitor.*`
              });
            }
