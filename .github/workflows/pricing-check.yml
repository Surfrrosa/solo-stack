name: Pricing Page Monitor

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9am UTC
  workflow_dispatch: # Manual trigger

jobs:
  check-pricing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Check pricing pages
        id: check
        run: node scripts/check-pricing.js

      - name: Commit updated hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/pricing-hashes.json 2>/dev/null; then
            echo "No hash changes to commit."
          else
            git add data/pricing-hashes.json
            git commit -m "chore: update pricing page hashes [automated]"
            git push
          fi

      - name: Create issue for changed pricing
        if: steps.check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changed = JSON.parse('${{ steps.check.outputs.changed_tools }}');
            const toolList = changed.map(t => `- **${t.name}**: [pricing page](${t.url})`).join('\n');
            const today = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Pricing] ${changed.length} pricing page(s) changed (${today})`,
              labels: ['outdated-pricing'],
              body: `## Pricing pages that changed this week\n\nThe automated pricing monitor detected changes on the following pricing pages:\n\n${toolList}\n\n**Action needed:** Visit each pricing page, verify the current numbers, and update the corresponding YAML file in \`data/tools/\`. Update the \`last_verified\` date.\n\n*This issue was created automatically by the pricing page monitor.*`
            });
